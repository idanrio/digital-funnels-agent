services:
  - type: web
    name: digital-funnels-agent
    runtime: docker
    plan: free
    envVars:
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: GHL_BASE_URL
        value: https://services.leadconnectorhq.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        value: primeflow.ai@gmail.com
      - key: WEBHOOK_SECRET
        sync: false
      - key: APPROVAL_SECRET
        sync: false
      - key: SERVER_URL
        sync: false
